name: modellflug_app

description: Professionelle Modellflug-App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.1.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.1

  # Database
  sqflite: ^2.3.3
  path_provider: ^2.1.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  glassmorphism_ui: ^0.3.0

  # QR
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # Webcam / Video
  video_player: ^2.9.1
  chewie: ^1.8.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

  # Charts
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Image handling
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # 3D Viewer
  model_viewer_plus: ^1.9.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/splash/
    - assets/aircraft/
    - assets/webcam/
    - assets/icons/
    - assets/widgets/
